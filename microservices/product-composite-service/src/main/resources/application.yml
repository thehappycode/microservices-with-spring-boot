spring:
  application:
    name: product-composite-service
server:
  port: 8989
  error:
    include-message: always

app:
  product-service:
    host: localhost
    port: 8990
  recommendation-service:
    host: localhost
    port: 8991
  review-service:
    host: localhost
    port: 8992

logging:
  level:
    root: INFO
    com.thehappycode: DEBUG

---
spring:
  config:
    activate:
      on-profile: docker
server:
  port: 8080
app:
  product-service:
    host: product
    port: 8080
  recommendation-service:
    host: recommendation
    port: 8080
  review-service:
    host: review
    port: 8080
